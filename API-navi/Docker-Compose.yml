services:
  auth_api:
    build: ./Auth_API
    container_name: auth_api
    command: uvicorn app.app:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    environment:
      - MONGO_URI=mongodb://admin:admin123@mongo:27017/auth_db?authSource=admin
      - ROOT_PATH=/auth
    depends_on:
      - mongo

  logging_api:
    build: ./Logging_API
    container_name: logging_api
    command: uvicorn app.app:app --host 0.0.0.0 --port 8001
    expose:
      - "8001"
    environment:
      - MONGO_URI=mongodb://admin:admin123@mongo:27017/logging_db?authSource=admin
      - ROOT_PATH=/logging
    depends_on:
      - mongo

  map_api:
    build: ./Map_API
    container_name: map_api
    command: uvicorn app.app:app --host 0.0.0.0 --port 8002
    expose:
      - "8002"
    environment:
      - MONGO_URI=mongodb://admin:admin123@mongo:27017/map_db?authSource=admin
      - REDIS_URL=redis://redis:6379/0
      - ROOT_PATH=/map
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7.0
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123

  nginx:
    image: nginx:alpine
    container_name: nginx_gateway
    ports:
      - "8000:8000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/errors:/var/www/errors:ro
    depends_on:
      - auth_api
      - logging_api
      - map_api

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  mongo_data:
  redis_data:
