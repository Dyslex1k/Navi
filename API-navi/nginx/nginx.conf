events { }

http {

    # Map status codes to readable messages
    map $status $custom_error_message {
        400 "Bad Request";
        401 "Unauthorized";
        403 "Forbidden";
        404 "Page Not Found";
        500 "Internal Server Error";
        502 "Bad Gateway";
        503 "Service Unavailable";
        504 "Gateway Timeout";
        default "Unexpected Error";
    }

    server {
        listen 8000;

        # Use ONE error page for all these codes
        error_page 400 401 403 404 500 502 503 504 /custom_error.html;

        # Serve the error template
        location = /custom_error.html {
            root /var/www/errors;

            sub_filter_once off;
            sub_filter "{{STATUS_CODE}}" "$status";
            sub_filter "{{ERROR_MESSAGE}}" "$custom_error_message";

            add_header Content-Type text/html;
            gzip off;
        }

        # Auth API
        location /auth/ {
            proxy_pass http://auth_api:8000/;
            proxy_intercept_errors on;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Logging API
        location /logging/ {
            proxy_pass http://logging_api:8001/;
            proxy_intercept_errors on;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Map API
        location /map/ {
            proxy_pass http://map_api:8002/;
            proxy_intercept_errors on;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
