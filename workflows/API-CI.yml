name: FastAPI Microservices Tests

on:
  pull_request:
    branches: [ main, api ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - Auth_API
          - Logging_API
          - Map_API

    defaults:
      run:
        working-directory: API-navi/${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -v
